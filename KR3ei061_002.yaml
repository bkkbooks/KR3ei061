body:
  text: 卷中臨産門六字真言一曰睡臨産必須睡者以睡則腹平子易轉身且胞血不致太傾令胎滑而易出並免臍絆兒肩頸致兒急出有斷臍之事又橫生逆産皆由轉身不及故也凡橫生逆産者急令仰臥托其手足入用催生藥極驗若跪坐生法終是不穩故睡為第一法二曰忍痛痛者人所難忍不知痛既痛矣不忍若何不忍痛則不能睡而必急急臨盆只一不忍痛而六字皆虛設也不忍則必大呼號哭以耗其氣産後多氣脫不忍則必循休顛倒以動其血産後多血暈並至於橫逆産難而不知也可不忍哉故忍痛為第二法三曰慢臨盆産母臨盆必待時刻臨盆急用力早至當用力時已無力矣故忍痛以待時睡以舒體若太早則血破胞干兒不能出者有之或交骨未開勉強臨盆兒頭半出而不能出者有之又或兒既出矣而胎未下産門隨閉以致數日不出且用力過度兒不能轉甚則變為橫倒凡此皆以急臨盆故也切不可聽穩婆言以為兒頭將出急令臨盆性命攸關何苦草草故慢臨盆為第三法臨産總論人無不由母生此常事也足月而生正理也草木拆甲而出地禽鳥破卵而成雛此皆物之無知孰為催之孰為藥之夫草木在肥土而生芽速燕雀得純陽而雛易成如産母之血氣足者然他如瘠土之物難生鵝鷇彌月不出皆其常無足怪者聽其自然而已世人無知而自損其命豈不痛哉古人六字真言可謂法良意美豫不復贅但取古方擇其尤精者並參以己見略纂一卷簡而最精明而易用平日講之倉卒閲之危難即解原世人不以為誕而唾棄之可耳志臨産例言凡臨産之家安置産室預備藥物勿用穩婆須擇生子多之老婦一人令其探實看在何時用何藥芎歸湯最神者也他如下載各方以時取用最穩最精其應如響又有臨産諸方可以治産難者各於主治詳載細心體之萬無一失正産正産兒頭將順未順胞漿已破下血腰痛腹痛目爆花中指動是其外候此時照六字真言最穩下載方藥可以審用佛手散見胎前方內催生最穩最速水煎加入酒盞半又煎五七沸溫服如口噤擀開灌之少頃又灌盡此一料立産加味芎歸湯古治三五七日不下唾死及交骨不開神效當歸一兩酒洗川芎七錢龜板手大一塊約五六錢醋炙研細女發雞子大一團瓦上焙存性水煎溫服大料四物湯古治瀝漿生者先來清水數日致胎干難産急急用之當歸頭二兩酒洗酒芍川芎各一兩熟地三兩房內熬煎使産婦口鼻達其氣以滋益之又連服上加味芎歸湯以生下為度達生散古臨産服最效蜜玉竹當歸頭各二錢焦術酒術酒芍炙草各一錢陳皮去白大腹皮酒洗曬乾各八分蘇葉五分水煎服臨産時加青蔥五根或蔥白七寸或黃楊尖七枚又春加川芎夏加黃芩秋加福泄冬加砂仁若系氣虛倍用玉竹焦術氣實加香附陳皮血虛加當歸熟地體實倍蘇葉性急多怒加黃連柴胡熱甚加黃芩濕痰加滑石法夏食積加山楂腹痛加枳殼木香保生無憂散古臨産服補血順氣即胞厚蒂牢皆可易産無瘀血腹痛當歸酒洗川芎酒芍乳香制另研泡枳殼麩炒血餘燒存性南木香等分炙草一錢水煎作二次服乳香血餘木香泡服無時開門丹參古治兒頭逼到産門不下紅芽柞木尖七個當歸二兩川芎一兩蜜當參二兩水濃煎服少頃必生如聖散參古專治難産蘇葉白芷不見火為末麥冬去心各一錢當歸酒洗生地酒洗熟地各二錢地榆五分急流水煎每服三五錢來蘇散古治用力太過氣脈衰微精神困倦目眩頭暈口噤面青髮直不省人事木香三分神麯炒陳皮去白黃柏酒炒各一錢淮耆酒炒阿膠珠酒芍各三錢甘草一錢糯米合半生薑三片炒黑引水煎擀口灌之連進為妙三合濟生湯參古治難産雖一二日不下者服此自然轉動下生當歸五錢酒洗川芎枳殼麩炒香附去毛酒炒大腹皮薑水洗各二錢粉草一錢蘇葉錢半不拘痛與否但似正産即煎服此即非正生亦不妨一方加白芷一錢若交骨不開加入龜板酒酥三錢紅芽柞木尖七個胎氣脹痛欲轉不轉加黃楊尖七個淮牛膝錢半柞木黃楊必見之的乃可用否則只用本方七黑丸高腰痛方可用延胡酒炒荊芥炒黑各二錢元參瞿麥炒黑各一錢川芎皮錢半百草霜五分共為末米飲和丸本方加乳香沒藥制各錢半米飲和丸名先生丸治同滑胎散古催生益元散一兩節甘草滑石六一散全蟬蛻五個山甲珠一片男發一團香油熬化研急流水煎二沸入發灰拌勻冷定去滓服之立下神效乳砂丹古治難産明乳香為細末以豬心血和丸硃砂為衣曬乾每服一丸一錢重嚼碎冷酒下良久未生再服或以荷葉蒂七個煎水化服二丸良久未生再服合丸五月五日午時極妙或七月七三月三及月初上吉日須焚香致敬設藥王位對東方每料作五丸閣中土之數或七丸合春數又法令産婦兩手各握一石燕口念醫巫藥聖徐行數步脫瓜煎袁無論試月正産古有芎歸湯百無一失豫立此方治腰腹急痛不知正産試月服之立辨當歸四錢酒洗酒芍焦術杜仲鹽水炒各三錢陳皮十白半去白黃芩酒炒茯神各二錢炙草錢半木香三分薑棗引順取急流不流二水煎又以羌活二兩蔥白四十根大者十根約四兩重為度韭菜根一兩野菱角苗一本無則以乾荷葉三皮代斑竹籜二兩取急流不流二水各一斛煎藥乘熱氣之夏加斑竹葉百皮冬加生老薑胡椒各一兩煎氣如無流水將竹一籩作梘令急流取用催生符從速字左旋到身字接寫急急句然後寫牛字塗沒寫馬字亦塗沒不見黃紙朱書於見天處對三光設香燭誠敬書之或夜不見月星但對天燃燈燭書之切忌入婦女手於臨産時焚潔淨碗內開水泡服即生生後當天叩謝代書者不可索謝但囑主家當天謝之或先期書或臨期書隔居遠者或符未服兒已生下主家亦必當天焚符叩謝不可輕褻産難胎死腹中橫生倒産生産常事不意而致産難尤不可不慎呼吸在爭一刻時耳古語面赤舌青母活子死面青舌赤子活母亡面舌俱青母子俱死若橫生逆産母子亦有生死之別以下藥方有並載於前者擇而用之佛手散見胎前方內治子死腹中立下及橫生倒産加熟黑豆童便加味芎歸湯見前正産內治胎死腹中及橫生倒産平胃散古治胎死三日不下指甲舌俱青脹悶口中糞臭蒼朮米泔炒厚朴薑水炒陳皮去白各三錢炙草一錢二分酒水各半煎加朴硝二錢再煎三五沸溫服胎化血下烏金散古治難産或熱病胎死腹中或顛仆或下之太早胎干身冷不出有面舌唇青等證又或雙胎一死一活須臨時觀變熟地洗切焙乾又酒焙大當歸酒洗各四錢蒲黃炒黑錢半交趾桂三分研泡酒芍二錢良薑去皮酒炒炙草各一錢小黑豆一合炒百草霜五分研泡先進佛手散後用此化生龍鱗湯參古治十月已滿因多恣情及多吃熱毒物瘀血相搏臨産逆倉忙不謹胎死腹中茺蔚子三錢如春夏取生益母草搗汁一杯不用子鳳仙子約三百粒當歸五錢酒洗陳枳殼生地各二錢酒洗蘇葉川芎各錢半陳艾醋炒甘草各一錢活鯉魚一個約半斤重小者三四個約一斤分作二服每用水三碗先將魚入水內坐火上略溫急取魚出魚死則難效後下藥煎至二碗服時入好醋一茶匙每一碗和調七黑丸一顆如胎死不下急取無根水再煎連服二次即下一方加大棗十枚白芷重一錢者一根不切搗之催生立應散古治橫生逆産車前子五分當歸五錢酒洗冬葵子白芷大腹皮薑水洗一錢淮牛膝枳殼川芎酒芍各錢半水煎服益母湯古治胎死腹中橫生倒産及胞貫血益母草搗取汁七合煎半頃服之立下無新者用乾者一大把水煎服轉頭丹古治橫生倒産蜜耆川芎各二兩當歸三兩酒洗朵紅花八分胡椒三粒荷葉三個引水煎速服不效再服倘兒頭在門不出速服開門丹方見正産內又方取燕子窩大者半個小者一個連泥草糞用水本四五碗煎數滾澄清令産母飲一碗即順生黑神散古一名催生如神散治橫生逆産其功甚大百草霜白芷不見火共為末等分每以童便米醋和如膏滾水調服二錢或童便酒煎進二次血見黑則止此藥既固血又免血涸甚妙一方加滑石煎芎歸湯調下方見胎前內婦人素有內傷病者不可用柞木引子古治橫生逆産或胎爛腹中脹悶生紅芽柞木一尺長洗淨寸銼大甘草五寸長銼作五假以新汲水入新磁器內紙三層封緊純火煎候腰重痛時溫飲一小盞心下便開豁如渴再飲至三四杯覺下重便生一方加龜板酒酥一兩名水陸二仙救苦湯治同牛膝湯古治胎死不下體素虛及有內傷病者忌用淮膝三錢瞿麥歸尾各二錢冬葵子一錢炒通草五錢水煎服一方有桂心酒炒二錢達生散滑胎散保生無憂散神效乳砂丹並見本卷之首兼治産難雷公誦佛法古治橫生倒産令本婦口念無上至聖化生佛百遍並以鹽少許察兒手足即縮入或用黃丹擦亦可又用蜜黨參當歸酒洗各一兩蜜耆二兩熟付一錢急煎速服脫胎薰法高治橫生倒産栗木槐木紅芽柞木各大如杯長一尺直者稀節竹不拘何竹擇節稀至七八寸者二筒紅莧菜苗大者三根小者三十根無苗則用子一兩生牛膝三兜連苗生用無則用乾者一兩千腳泥一斤左草鞋一隻共煎水一大鍋桶盛提至房中令産婦通其氣即順生治橫生倒産符令天地日月星江海順流大德曰星咒曰生生生何事倒而橫我今施正法勿損母命勿損兒身急急如天醫使者律令此符不拘硃筆墨筆黃紙書後誦咒一遍其餘一切並與前符同橫倒者服下即順令産婦口念無上至聖化生佛
