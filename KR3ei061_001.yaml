body:
  text: 卷上胎前門十字真言一曰節嗜欲婦人火最易動火動而命門傷胞系不固且有孕犯房事令胞大難出生子多病夭節欲所以固精而養腎二曰節勞逸富貴之家深居晏處則過逸貧寒之家朝夕操作則過勞凡逸緻難産筋骨不活也勞易墮胎血脈多損也節勞逸所以固筋骸舒血氣以養肝三曰節起居古人云常近詩書行正事婦人多不識字安問詩書德在順從有何行事惟不登高臨深涉險毋近穢惡毋多諧謔節起居所以養心四曰節飲食飲醇酒散血耗氣亂性食禁物令母子不安遇醉飽飢渴皆失事惟淡泊為主節飲食所以養肺與脾五曰節聞見聞歌唱戲語令淫心生聞鬥毆罵詈令怒心生聞金鼓走馬刀兵令懼心生惟聞讀書雅樂聲令人心正而生喜見異物怪氣人見龜蛇兔令生子不全見人血迹令人生警見殺戮令人心暴惟書籍金玉令人心正而悅節聞見所以養意以上各條皆集古格言婦人多不知惟知理父兄丈夫時講明其未盡者可以隅反胎前總論婦人血氣和乃有子及孕而有病又曰血氣不和者何故此蓋臟不平也胎之受養有月數臟之遞傳有乖違以故生病凡一切六淫七情之屬又從而中傷之是以治之宜按月數及時令又必詳審其性情起居而後無不效之藥略集古方加以群仙高見並參末議集為一篇以行於世慎勿略之可耳志胎前論娠妊經脈主治及逐月養胎法娠妊一月名懷胎系足厥陰肝脈養之飲食精熟酸羹受御食宜大麥毋食腥辛不為力事寢必安靜無令驚恐是以固其血二月名始膏胎始結足少陽膽脈養之毋食辛臊居必靜處房事勿犯是以固其精三月名始胎手心主包絡脈養之毋悲思驚恐此時形象始化因感而成宜養母體氣以正子形養母心志以正子德此為胎教四月始受水氣以成血脈手少陽三焦脈養之食宜稻羹宜魚此時見六腑順成當靜形體和心志節飲食是謂盛血氣以通耳目五月始受火精以成氣足太陰脾脈養之調五味以和陰陽毋遇飢飽毋食乾燥毋自炙熱毋太勞倦沐浴沉衣深居晏起厚衣服以避寒殃是謂養氣以足五臟六月始受金氣以成筋口目成足陽明胃脈養之調五味進甘美毋太飽身欲微勞毋靜處是謂變腠理紉筋養力以堅背臍七月始受木精以成骨皮毛生手太陰肺脈養之食宜稻粳以密腠理勞身搖肢以運血氣居處必燥飲食避寒毋大言號哭毋薄衣洗浴是謂養骨以堅齒八月始生土氣以成膚革九竅成臟腑具手陽明大腸脈養之毋食燥物毋輒失食和心靜氣毋忽大起是謂密腠理以光澤顏色九月始受石精以成毛髮兒續縷皆成百節畢備穀氣始入於胃足少陰腎脈養之飲醴食甘毋處冷濕著灸衣緩帶自持以待時是謂養毛髮以致才力十月受母諸臟氣脈之養備五臟得氣六腑通靈納天地氣于丹田關節人神皆具待時而生矣前集巢氏陳氏徐氏諸説手足六脈養胎之法皆準於天地四時如肝膽為一臟一腑表裡之經屬木旺春為四時首故經養始此歷夏火秋金冬水而氣備惟手太陽手少陰心脈為君尊而無為至於胎繫於腎為母子真氣所關養至腎而胎全矣凡養胎之脈不可針灸其經醫者按圖考明幸勿造次此但載飲食起居所宜諸忌則詳後章茲不贅食忌妨母者食茨菰消胎氣食驢騾馬肉遇月難産豆醬合藿香食墮胎食蟹橫生食豬肝血敗血雞子合桑椹食倒生心寒食一切辛熱物胎熱食冰漿絶産食無鱗魚難産多食豬肚致胞大難出多食雞致胎熱妨子者雞子合糯米食令子生寸白蟲食牛肉缺齒食兔肉缺唇食犬肉無聲鯉同雞子食生疳多瘡食羊肝多厄食龜鱉蝦膜縮頭短項食蚌背曲口噤雀肉同豆豉食麵生黑子食薑生岐指雀肉下酒子淫食山羊多病食菌致驚風食雀腦令兒雀目藥忌蜈斑水蛭虻蟲烏頭附子天雄野葛衛矛巴豆牛膝薏苡桃仁代赭芫花蟹麝大戟蛇蛻蜈蚣牙硝芒硝肉桂丹皮槐花南星半夏牽牛皂角瞿麥通草茅根雄黃雌黃乾漆蜃砂莪朮三稜凌霄麥芽商陸乾薑地膽地膽水銀起居忌起居不慎最易傷胎破産今集諸説而詳之勿亂服藥勿過飲酒舉重物此惜身之道勿登高臨深涉險勿入巷廟見獰惡神像致心大驚非獨難産且子多癲癇勿向非常地便溺恐觸異氣勿觀劇及殘疾奇怪之人與並雞走狗弄猴百戲令心散感異勿多睡時常行動勿過勞力使腎氣不足生子解顱衣食勿太溫飽令脾胃不和營衛虛怯子必羸瘦多病又凡修造有犯胎氣皆能墮胎損子刀犯形殘泥犯竅塞打擊者色青黯縛系者筋拘攣此等應如影響切宜避之附載六甲胎神月日所占方位切忌修作犯之有損胎孕正月休房二月忌房三月堂門四月灶廚五月休身六月倉休七月磨碓八月戶廁九月房門十月休房十一月灶爐十二月休房天干占甲乙日占門乙庚日占碓磨丙辛日占廚灶丁壬日占倉庫戊癸日占房休地支占子午日占碓丑未日占廁寅申日占爐卯酉日占大門辰戌日占雞棲己亥日占休合日辰干支並論如甲子日占門與碓是也餘日仿此例言胎前養血氣而已古人作佛手散其理至精而未能盡者以用者不知按月及審時觀人故也今此一編至為詳盡穩洽凡一切稍犯胎氣之藥不録非不謂有故無殞也王道之治能生民霸者之民非不強而生息蕃庶難矣用者慎之胎前方佛手散即芎歸湯三兩治一切胎前産後危急之症安胎最穩催生最速當歸川芎二兩四次煎服川芎探胎法月經三月不行者以此探之真雀腦川芎不拘多少為末濃煎艾葉湯空心泡服遇二三時腹內微動是胎否則經滯安胎散治胎動不安焦白朮當歸酒洗各一錢黃芩錢半酒炒炙草三分水煎服腹痛加炒神麯五分氣虛泄瀉加蜜玉竹二錢陳皮去白五分潮熱加酒炒紅胡一錢氣上逆加枳殼炒三分安胎散景嶽治卒然腰痛下血熟地艾葉白芍酒炒黃耆炒阿膠米粉炒珠當歸炙草地榆各一錢薑棗引水煎服四物湯統治胎前産後及胎漏惡阻等證當歸酒洗熟地各三錢川芎一錢酒白芍錢半水煎服本方加阿膠二錢艾葉醋炒錢半名膠艾四物湯千金保孕丸治怪墮胎常服可免杜仲四兩用糯米炒去絲川續斷二兩酒洗共為末山藥糊為丸梧子大空心米飲每下八九十丸忌酒醋惱怒運生散臨月服十餘劑易産或加砂仁枳殼兼別證以意增減大腹皮酒洗曬乾陳皮去白各八分蜜玉竹當歸各二錢焦白朮酒白芍炙草各一錢蘇葉五分水煎服臨産時加青蔥五根或蔥白七寸或黃楊尖七枚春加川芎夏加黃芩秋加福泄冬加砂仁氣虛倍玉竹白朮氣實加香附陳皮血虛加當歸熟地形實倍蘇葉性急多怒加黃連柴胡熱甚加黃芩濕痰加滑石半夏食積加山楂腹痛加枳殼木香泰山磐石散治婦人血氣兩虛或肥而不實或瘦而血熱或肝脾素虛倦怠少食慣墮胎者蜜黨參蜜耆焦術各一兩熟地當歸各兩半續斷炙草各五錢川芎黃芩酒炒各八錢酒芍六錢砂仁二錢炒研泡服米三合共作末服無時如有他證加減如上達生散法安胎飲妊娠五七個月多服可保全産條參焦白朮當歸熟地川芎酒白芍陳皮去白炙草黃芩酒炒蘇葉各一錢薑引水煎服一方有砂仁以上皆集古方逐月養胎方一月烏雌雞湯參古陰陽新合寒為痛熱多驚腰痛腹滿胞急卒有烏雌雞一雙治如食法茯苓二兩阿膠珠一兩吳萸三錢滾水泡麥冬去心焦白朮酒白芍各五錢生薑蜜黨參各一兩煮雞取汁下藥布袋絞去滓加無灰酒一斤入阿膠熬盡忌鐵不時服安基飲袁治飲食不進神氣不調睡多夢口小渴甚見惡阻酒白芍茯苓當歸各二錢炙草川芎薄荷各一錢焦白朮錢半枳殼八分炒紅胡六分酒炒水煎服此養在肝克脾若舌乾口苦加酒黃芩錢半身有寒熱羌活一錢倍用紅胡此時宜食粥固胎胚湯高參古治傷胎如跌僕驚犯腹痛卒有所下下言傷胎仿此酒白芍白芷各一錢黑枝仁五分甘草一錢元參錢半水煎服若吐血衄血加黑荊芥一錢二月艾葉湯參古治陰陽踞經有寒多壤有熱萎悴中風寒有所動搖或心滿臍下懸急腰背強痛卒有所下乍寒乍熱艾葉醋炒當歸酒洗黃耆酒炒各二錢丹參酒炒八分羌活甘草阿膠米粉炒成珠各一錢薑棗引水煎服日二劑扶母益真散袁治口吐清水飲食少進愛酸冷者焦白朮五錢茯苓八錢蜜耆生耆川芎各二錢制首烏三錢當歸四錢共研末不時泡服如吐痰加淮藥六錢炒氣滯痛加陳皮去白錢半紅胡酒炒錢半金雞出谷湯雷治傷胎練金而散之使不傷木出谷保其土故名黑薑灰梔子秦艽杏仁去皮尖各一錢種蘿蔔兜一個白菜子炒香錢半銀杏仁五粒吳萸二錢水泡三次又用黃連煎水炒三次研末作散或作丸以芎歸湯吞服豁達散袁治心悶不樂若有哭泣之狀飲食時多時少白帶不止顏色若浮枯黃芩酒炒當歸酒洗各錢半陳皮去白蒼朮制山通各八分大腹皮薑水洗枳殼麥炒各一錢志肉甘草水泡五分茯苓三錢萱草引水煎服一劑不愈加酒白芍二錢再服又或用五倍料米飲和為丸萱花煎水吞三月茯神湯古治傷胎茯神三錢龍骨煅一錢蜜黨參當歸酒洗各三錢阿膠珠丹參各錢半炙草一錢赤小豆百粒大棗三枚引此時並宜常服千金保孕丸方見卷首腰痛加桑寄生二錢胎驚散參古治驚恐憂愁嗔怒傾僕動經腹滿繞臍苦痛或腰背痛卒有所下延胡酒炒二錢熟地枸杞鹽水炒杜仲鹽水炒甘草各一錢當歸酒洗二錢酒白芍川芎各錢半木香五分另磨蘇葉引水煎服一方用紅棗益母草引火能丹袁治寒證面目青腹微痛四肢青而冷大便青吳萸水泡淮藥炒黃各二錢當歸茯苓焦白朮各三錢橘紅酒炒一錢砂仁三分炒研泡服陳米引煎服二劑腹脹加大腹皮或用三料陳米糊丸水虎丹袁治熱證舌乾口苦小便黃赤衄血吐紅痰塞桑白皮去油二錢生地酒洗當歸酒洗各三錢連翹去間桂心酒炒白芷各一錢生白芍錢半升麻酒炒三分薑引水煎服腹脹加大腹皮薑水洗粗筋一錢四月調中湯參古治傷胎焦白朮當歸酒洗各二錢酒芍川芎靳艾醋炒甘草續斷各一錢厚朴薑水炒夏月用一錢余月五分煨薑一錢為梅三個引水煎童便對服歸原散高治跌足驚胎噯清水不止陳米炒當歸酒洗各二錢續斷酒芍各一錢木香三分茯神錢半大棗三個去核引午後煎童便對服一方加荊芥穗香附各二錢俱用童便炒七次溫服菊花湯古治有寒欲嘔胸滿惡食有熱小便如淋臍下苦急中風寒頸項強痛寒熱或驚動身軀腰背腹痛胎上逼胸卒有所下菊花雞子一大團麥冬去心熟地各二錢元參紅胡酒炒甘草各一錢當歸酒洗三錢薑一錢棗四個泉水煎日服一劑如意散高治心慌心恐茯神大腹皮薑水炒福世鹽水炒正芎各一錢續斷錢半靳艾一撮烏梅三個泉水煎服二日一劑一方遠志代續斷五月阿膠湯古治有熱頭暈心亂嘔吐有寒腹脹痛小便數卒有恐怖四肢痛寒熱胎動無常處悶頓欲僕卒有所下阿膠珠四錢麥冬去心黃芩酒炒各一錢當歸酒洗錢半酒芍元參各一錢吳萸泡五分旋覆花二錢生薑三片引水煎服一方用志肉一錢化青二錢去阿膠厚重湯孫治虛中有熱胎動欲墮生地熟地當歸酒洗各三錢杜仲鹽水炒酒芍續斷各錢半淮藥二錢炒紅胡酒炒八分青皮六分炙草一錢枸杞苗四錢切如谷大米湯蒸蜜炒乾竹茹一錢生薑一錢引作散或湯或以米飲和為丸米飲吞虛汗加銀柴胡錢半酒炒去紅胡氣急腹滿加大腹皮去白陳皮各一錢安中飲古治傷胎氣三五七月易墮土火不足法宜清火逐淫黃芩酒炒生地酒洗各三錢川芎酒芍各二錢五味火炙草蜜條參各一錢當歸四錢酒洗麥冬去心五錢大麻仁酒蒸二錢生薑大棗引此方身體沉重卒有所下咳嗽煩渴體實者宜之若體虛者用安胎飲磐石散二方載卷首因因保生湯袁治婦人素有熱舌乾口渴口苦身微熱無津白帶下體壯或染外熱吳萸泡二錢又用黃連錢半煎水炒後並將黃連合煎青皮陳皮去白各一錢甘草麥麩元參石斛各二錢黃芩二錢略用酒炒熱甚生用車前草引麥門冬湯古治驚怖寒熱手足痛腫腹脹痛忽有所下如欲産然麥冬去心二兩洋參三錢薑蒸熟炙草一錢生地五錢黃芩酒炒阿膠珠各一兩薑棗引煎服本方加益母草兩半白蜜五錢白芷三錢名益母安中飲治同而效速氣滯痛脹加香附八錢醋鹽水各炒一次老壽星湯古治卒如驚恐歌哭見怪似痰非痰面赤舌青若中風寒狀生白芍麥冬去心當歸酒洗各三錢淡竹葉連翹去間防風各錢半五味子十粒麥米五合黃芩秦艽黃連均用酒炒胡椒研各一錢以豬肺四兩煮湯去肺及油沫入藥煎去滓服一劑七月七月病多不能備載但將可以墮胎之證開明此時有正産者有試痛者有轉胞者凡此皆不常不可慌急臨盆但服佛手散安胎飲靜待而已二方載卷首蔥白湯古治忽驚恐動搖腹痛卒有所下手足厥冷復如傷寒煩熱腹滿氣短口苦項腰背並強蔥白三四寸長者四根短者六根南方不用四季蔥黃耆酒炒四錢當歸酒洗四錢秦艽酒炒一錢黃芩酒炒錢半麥冬去心二錢旋覆花酒炒四錢甘草一錢四分老薑桑白皮引少加酒煎藥搗蔥白泡服疏尊飲高參古治骨軟如癱腹如裹急腰痛胎欲墮生地熟地各三錢骨碎補酒炒福泄鹽水炒各一錢蘇枝三錢枝仁炒苦參各五分陳皮去白二錢枸杞苗三錢切如谷大米湯蒸透用蜜炒乾蘇兜二個織布棉紗尾一兩水煎服欲嘔加稻草根二錢七寶生生散袁治傷胎亦可治正産等證銀杏仁六粒杏仁去皮尖龍眼肉各十粒去核大棗去核二十粒棗仁一錢炒胡桃肉三個烏梅肉五個共研作丸三四十粒龍眼包之亦可將紫蘇兜梗枝葉全者一本另煎水每次煎川芎一錢當歸二錢對以紫蘇水吞丸十粒天氣燥服七八丸八月天成玉液丹袁參雷治目眩頭暈口苦寒熱身痛四肢脹升麻五分紅胡酒炒白芷各一錢黃芩酒炒續斷各錢半桔根甘草薄荷各一錢酒芍二錢羌活一錢薑引水煎服地平金鎖丹雷安胎止漏治腰臍足痛有所下煩滿不食獨活梔子淮藥炒黃耆酒炒各一錢厚朴薑水炒黃芩酒炒杜仲鹽水炒各錢半當歸酒洗二錢冬青木根引水煎服海龍塞開湯袁治傷胎白芥子炒錢半連翹去間麥冬去心福泄鹽水炒甘草川芎各一錢延胡八分杏仁去皮尖五粒五味十粒枸杞酒炒二十粒當歸酒洗三錢煎水泡通大海一粒服此時亦能生而成人如七月法治之九月九月正生矣即不生不遠矣服濟生丸可預備臨産藥以待陽升丹袁治腰膝痛頭暈目如見鬼妄言妄行非痰病當歸酒洗二兩黃耆酒炒半蜜炒半川芎各一兩防風二錢酒白芍麥冬去心各五錢花粉一錢神麯錢半炒羌活三錢杜仲鹽水炒續斷各四錢水煎用佛手柑搗爛作三次泡服如無鮮者即以市中佛手片入藥煎服濟生丸於氏新方枳殼炒生地熟地各三錢川芎一錢補固脂酒炒青皮酒白芍各二錢小茴一錢炒共研末用東流水浸一宿又以東流水煮灰面半斤傾入先浸藥內攪令稠如糊再以黃芩酒炒末錢半當歸搗如泥五錢合而搗作丸十月十月治法同九月當歸補腎行氣方無一定不可殫述傷胎服佛手散載卷首此時勿妄用藥此為平常無病婦人而設故凡中風寒及外感之病皆不録至於胎前雜病症數不一臨時延醫治之聿有成書不難推考此集藥味務宜平穩一切有犯胎氣之藥概不收入為不行醫不知藥性而設若有故無殞在善醫者慎用茲不贅又世有過月不産者方證載後十一月胎孕十一二三四月而生常事也前人但云氣血養胎有餘而會不立一方何哉不知胎受氣既足自然瓜熟蒂落何能久處腹中而悶坐數月乎此乃血氣有餘而胎不足因前十月之養不備也必轉而乞養於肝水木相生生生之妙也十一月者補其肝補肝而膽實膽實而精壯矣決不可以為怪胎妄用下藥安胎飲古載前治傷胎倍加蘇葉生生無已丹袁過時者一月養傳二經十一月宜服此熟地四錢棗皮炒茯苓生芍各二錢當歸酒洗淮藥炒各參錢福泄鹽水炒川芎各錢半紅胡酒炒一錢水煎服十二月天王補心丹古治心悸生地蜜黨參元參炒丹參炒茯苓一方用茯神桔梗志肉炒棗仁炒研柏子仁炒研去油天冬炒麥冬去心炒當歸酒洗五味子炒各一錢蜜丸彈子大臨臥燈心湯吞一丸或噙化一方有石菖蒲四錢無五味一方有甘草坤元載定湯袁此時胎養於心脾服此茯苓茯神各四錢志肉甘草水泡錢半當歸酒洗三錢酒芍二錢陳皮去白錢半炙草一錢水煎將黑芝麻黑豆各二合炒熟搗融乘藥熱泡服十三月子母交養丸袁此時動與舉止皆較常胎不同土金交養故也非怪也此方主之白芨另蒸水茯苓焦白朮各二錢蜜黨參元參炙草各一錢麥冬去心錢半共研末白芨水和丸乘濕服鋤金飲子袁治傷胎鬱金酒炒錢半陳皮去白枳殼麥冬去心白芨黃耆酒炒各一錢焦白朮金銀花各二錢桑枝取近尖者七個三寸長蜜炒車前草引水煎服十四月六味地黃丸古熟地砂仁酒拌蒸四錢山茱肉酒潤錢半山藥炒三錢茯苓乳蒸二錢澤泄鹽水炒錢半丹皮酒洗五分此味傷胎故臨月亦輕用蜜丸空心服或湯劑亦可六君子湯參古傷胎用此合保孕丸服保孕丸載卷首蜜玉竹四錢焦白朮茯苓各二錢陳皮去白炙甘草各錢半法夏滾水泡七次薑水炒錢半水煎服此古書不載者凡孕過月不明用探胎法過月不産有此數方切勿視為泛常可也附子癇子懸胎孕子病多而最急最可懼者莫如子癇子懸二證故特標出非挂漏也羚羊角散古治子癇子癇之症有二曰心脾不足心不足者虛中有熱手足搐掣眼向上而淡紅聲鴉而不長一發或如死是也此方主之脾不足者血不養胎手足拘攣眼昏昏如睡聲如常一發一刻而止是也坤載湯主之大抵在四五月者責在心在六七者責在脾羚羊角鎊川獨活棗仁五加皮薏苡仁防風當歸川芎茯神杏仁去皮尖各五分炙甘草木香各一分薑五片水煎服若因肝經風熱或怒火所致須用加味逍遙散坤載湯高治脾不足成癇蜜耆二錢當歸酒洗二錢連翹去間川芎蜜黨參各錢半棗仁炒淮木通酒炒各一錢大棗二十個引水煎服有寒帶虛者加麻黃蜜炒二錢降真散袁治子懸證妊至四五月相火養胎致胎熱氣逆湊心心腹脹痛黃芩酒炒二錢黃耆酒炒八分蘇葉薄荷川芎各一錢枳殼炒生地酒洗各錢半水煎服若熱盛者黃芩用三錢或因事致胎上逼加阿膠艾葉或上逼而痛甚加當歸一錢蘇葉改蘇子或因寒在下焦加羌活一錢杜仲一錢或因寒在中焦加砂仁炒研五分泡服焦白朮一錢
