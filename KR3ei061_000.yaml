body:
  text: 附生生外録附方小兒科治小兒初生不啼不斷臍以溫湯將胞口扯開熏之啼即斷臍若胞衣不出不能待者將臍剪斷用艾葉三五錢搓絨不必搓淨作三五個團彈子火燒臍剪口用線扎緊燒以啼為止治小兒初生白色不轉紅而能啼者氣不達故也用艾葉陳皮陳米雞蛋共煮水洗兒即紅治小兒初生身上或一塊無皮此生在草中損之也用灰面略炒去火氣摻於細緞上包之三日不開即生皮或炒絶細米粉摻包亦可或加極細陳壁土末少許於粉內亦可治小兒臍風在三五七日內者是出七日外者非也知穴者用元宵燈火斷之又方荊芥羌活各三錢防風法夏陳皮枳殼各二錢生白附生附子各錢半苡米甘草各一錢共煎水一大碗如一升米多將兒放碗上令聞藥氣又以鉤藤鉤陳米枳殼共蒸水飲之乳母忌食一切動風物治小兒初生家中或發痘無藥可用趁兒未發急以辰砂三分明雄五分黃豆二十粒生黃耆一錢芝麻殼十個枳實五個不見火共研細末摻小兒衣則不染若三五日內已染痘症用升麻生柴胡防風各二錢茯苓陳皮去白各三錢牛膝山通各一錢枳殼十個黃豆三十粒老松樹根皮一兩無則用茯苓皮一兩一併煎水浴之不見風即出麻疹亦最易染即用上闢痘方去黃豆加生火麻仁五錢洗方同上亦去黃豆加麻仁小兒走馬牙有寒熱二症而寒者常少然寒以為熱則損矣熱者面赤唇焦鼻孔黑口熱啼時腰微向後反是也即刺破必有紫血即無血其色必紫用黃芩薄荷銀花甘草等分研細取芭蕉心內水和之棉花塗擦其處後不再生又以藥少許服之勿用蕉水寒者目皮下青唇白寒涎流出啼時腰曲向內吐乳刺破色白無血是也用胡椒一粒製附子二分羌活三分麻黃一寸共三研細照上法擦亦服之又方刺破以好墨醋磨和白砂糖點又方刺破以糖雞糞點但此二方俱不能斷根附生生外録附方外科凡孕婦患疔瘡不可服麝及搽蟾酥大戟破胎又表藥凡疔不宜並記之脫疔湯統治一切疔毒無論孕産皆可服羌活白芷甘草蔓荊子炒牛子炒連翹去間各一錢當歸二錢茯苓生白芍各錢半棗仁炒八分紅胡酒炒六分野菊根七兜引水煎在手足加桂心酒炒一錢在頭面加升麻五分在身加川芎一錢初發服之三日外加白礬末三分泡服走黃者加黃芩一錢鬱金酒炒八分去羌活白芷敷方硇砂月石輕粉黃丹明雄鬱金野菊根各一錢歸尾三錢共搗爛用豬膽汁調敷宿疔毒出矣若走黃者則去硇砂加百草霜三分錢鏽一錢共研細遍敷並於將走處斷其路千金祛毒丹治孕産婦內蘊七情外感六淫發為發背大毒等症一劑如神白芍三錢半生半酒炒蒼朮米泔水浸炒梔子黃芩白芷茯苓川朴薑水炒遠志肉甘草水泡陳皮留白各一錢香附去毛酒醋各炒一次連翹去間各錢半火梗八分薑引水煎服祛毒浴方苦參連翹薄荷各二兩白芷白芍各三兩羌活歸尾各八錢共煎水浴之凡孕産患疥瘡勿用水銀患風瘡勿用葛根切切統治一切瘡毒方馬渤擇肥大而未灰者不可太嫩研細末未潰者醋調敷已潰者將末略炒蜜調敷神效跋袁君以生生之術作生生之書生生者天地大德也天地以人為心而人身自胎産始生人之道本無殺機世之戕其生者皆誤其生者也袁君之書出而生生之機不息矣余不揣亦附以方並附小兒初生數方於末願世之欲遂生者善體其保生之真意焉高雪清跋從來奇兵制勝不如王道興師余謂用藥亦然症候危險如劍閣之難也而或以縋人之症候深固如逼陽之難也而或以老夫克之至於憑城以守塹壘以營猶之補中以調理也古之創方者非不謂孤注一下也設一旦軍或輿尸非主帥之過與夫作法非差不善用之咎耳袁君先得我心哉所作生生寶録一書以調養營衛為本而攻伐之品不入焉行之而有功用之而無弊其王道之師歟獨惜外科稍缺餘集而補之正如偏裨之從師而營衛之外又有巡哨書成聊志簡末道光五年孟夏月山村胡氏題附保産録胎元醫訣云婦人血勝氣者多子氣勝血者少兒宜以補血為主然或子宮虛冷或月經不調俱不孕虛冷者用勝金丸不調者有先期為血熱用四物湯加黃芩香附過期為血虛用當歸補血湯作痛為血滯用芎歸六君子湯加薑煎醫通云醫家認胎孕為經阻誤投破血藥認經阻為胎孕致成癥瘕病者不少凡孕已二三月時欲驗是胎否用生川芎二錢為末濃煎艾葉湯空心調服腹內微動即胎也保胎貞齊云保胎宜絶欲恣者以情欲一動則盜泄母陰且火擾於中則血氣沸騰故胎不寧謐即幸不犯小産而生子多白而不壽試觀牛馬犬豕受胎後絶不交故胎胎易個個存達生編云孕婦須常動勞為妙不可盡日坐臥勞則氣血流通胎與相習豈不安然故農婦賤婢墮胎常少但不宜攀高陟遠及見非常之物恐受大驚致子顛癇或舌縮成啞動勞中又宜謹慎薜院使云孕婦夜臥須兩邊換睡以防臨産偏頂便用記云孕婦飲食宜清淡蓋養胎在生血不在嗜味如恣嗜厚味不知節減徒令胞衣肥厚臨産見難出身且令孕婦多痰致有轉胞之瘡每見藜藿之家易産清淡故也尤忌辛熱之物致胎不安尤有宜絶者如食兔肉令子缺唇食雞子令子多瘡食鱔魚令子胎疾食鱉魚令子項短食螃蟹令兒橫生食䱏鯗令兒胎蛆食雀肉令兒心搖意亂不可不知寶鑑云頻慣墮胎者於孕二三月時用杜仲八兩糯米煎湯浸透炒去絲續斷二兩酒浸焙乾共為末山藥作糊丸梧子大每服五十丸空心米飲下調理孕婦諸病胎氣瘦怯嗜臥倦怠飲食懶進血虛體弱宜達生湯枳殼砂仁蔥子滿謂孕婦腹大脹滿逼迫子戶宜束胎散胎漏謂已孕而復下血或尿血是也夫女子之血上為乳下為經既孕則乳經俱聚子宮今復漏下是中焦有熱宜安胎飲加芥葉地榆胸脹加紫蘇若漏黃漿或白汁用炙黃耆一兩川芎一分糯米一合煎服自愈子淋謂孕婦小便短澀而痛乃下元不足用葵子四兩茯苓二兩研服日三服每服一錢此方可免胞內有水孕婦傷風或至咳嗽忌用風藥宜紫蘇飲加淡豆豉數十粒孕婦盛暑時發熱口渴神昏體倦懶食少氣是傷暑用清暑飲孕婦冬月傷寒惡寒發熱微嗽鼻塞甚至頭疼作痛先寒後熱藥多避忌不與常婦同治用蔥白十莖生薑一兩水煎熱服取汗即安有未産而乳汁先下名乳泣生子多不育宜常服安胎飲腹中胎啼者因孕婦登高舉臂致胎兒脫血乳故啼也令孕婦鞠躬掃地或撒米撿之使兒口接乳倘非登高舉臂便是胎熱以黃連煎汁孕婦時常呷之子懸謂胎氣逼上動心或忽昏暈不省或嘔吐欲死急以熱童便灌之次用紫蘇飲加鉤藤茯苓童便子癇謂孕婦體虛受風或冷麻或昏眩口噤背強甚至角弓反張仆地不省狀如中風又名風痙切忌風藥宜安胎散薑棗引子腫謂孕婦通身浮腫是也又足指發腫漸及腿膝喘悶不安或足指間出黃水又名子氣俱宜紫蘇飲若小便不利加車前子腫退宜安胎飲調理子煩謂孕婦頭昏目眩胎氣上衝煩悶不安用竹瀝頻飲或用葡萄擂汁飲亦效孕婦諸痛心痛用川楝子小茴炒各三分艾葉鹽炒分半煎服如腹痛用大棗燒研和童便服背痛脅痛腰痛紫蘇飲加砂仁童便孕婦泄瀉以補中安胎為主用四君子湯加白芍烏梅一個為引如發熱而渴者為熱加黃芩一分熱而不渴者為寒加黑薑五分久泄者加訶子肉一分乾薑六分孕婦目疾鼻衄及咽喉唇口諸病宜涼膈散加薄荷目赤痛者加當歸川芎羌活防風咽喉痛者加牛蒡子炒研一分口舌生瘡者加青黛二分鼻衄不止加當歸生地茅花各一分俱生薑引孕婦乳吹乳癰內用天花粉白芷貝母穿山甲炙研各八分蒲公英二分鼠屎二十粒俱研末酒服外用百合赤小豆柳根皮搗塗如乳癰潰爛用貓皮毛煅入輕粉油塗孕婦諸瘡毒宜托裡散瘡在背上下者本方去青皮加葛根升麻在胸前上下者去白芷加柴胡膽草枝仁在肩膊腋下者去青皮加陳皮桔梗桑皮天冬在胯內者去白芷皮在手足上下者去白芷青皮花粉加黃連黃柏木通孕婦忽然聲啞不言名喑胎此少陰之脈不能上榮於舌或痰歸心竅亦無聲俟産後自能發聲藥餌無治若投以通竅開發之劑則誤矣半産俗名小産半産調理倍於正産正産如粟熟自脫半産如生摘破其皮殼斷其根蒂也忽略成病因而莫起者恆多此證精血不足而萎墮故瘀血甚少倘有腹痛成塊有形多屬血虛氣逆惟用當歸補血湯則新血生而瘀血自去若用消導破滯劑則逆氣愈攻多致不救小産後數日忽渾身大熱面大赤口大渴思飲涼水此血虛之症宜用通治飲加丹參若認作傷寒而投以石膏芩連等寒涼之劑如落井下石矣如夾傷風則加柴胡張隱奄云治半産與治正産不同惟以滋補為獲咎恆少臨産臨産有八候脈離經臍腹連痛腰間重墜眼花如火穀道挺迸産戶腫滿手中指節跳動胞水或與血俱下方是子出胞時此八候孕婦須牢記方知這時候八候未備仍宜安眠稔食臨月初覺腹痛自家當知是宇宙自然之理但看漸痛漸緊方與人説以便伺候若痛得慢則是胎弄蓋正育一陳緊一陳胎弄則一陳慢一陳或間緊間慢胎至七八月肢體已能動彈或母腹積熱動勞太過以此大動而痛宜照常眠食如痛不可忍用大棗燒研對童便服或用縮砂仁炒研對酒服其用藥止以無憂散佛手散達生湯此三方未産能安臨産能催功難殫述倘魯莽臨盆錯到底矣懷胎六七月或八九個月偶略曲身胎忽亂動二三日間或痛或止或有水下惟腰不甚痛脈不離經是前所謂弄胎又有臨産一月前忽然腰痛卻又不産此是轉胞名曰試月蓋轉胞之病或孕婦氣弱者多憂者性躁者食厚味者致胞壓在一邊胞系轉戾故臍下急痛小便不利是也朱丹溪曰曾用清利藥鮮效因思胞不自轉為胎所壓胎若舉流水道自通矣豫屢用參朮引皆效不忌半夏者有傷食受寒而痛者傷食者當臍而痛手按之或臍旁有一硬痛是也宜和胎飲加枳實黃連陳皮痛漸緊大棗引寒痛當在臍下綿綿而痛不增不減得熱物陳緊一陳也宜和胎飲加黃耆柴胡茯苓川芎枳殼桔梗葛根蔥白三莖薑引正産腹痛要忍痛為妙不可用力努掙或扶人緩行扶桌站立痛稍緩則宜安睡以養神宜仰臥胎兒轉動自易切不可曲腰眠睡致胎兒偏左偏右坐宜正不可將身擺扭須知此是性命所關忍固痛不忍亦痛何如忍痛試思私産者痛到沒奈何時猶怕人知忍之至也故不聞難産倘不忍痛疾呼亂倒恐有橫逆之患又非全不用力必備此八候方可聊助片時耳房中宜安靜如常只用老成歷練一二伺侯凡族鄰婦女婉言謝退忌交頭接耳説亦説怪致令孕婦憂疑慌亂臨月更不宜多人在房恐熱氣壅盛令産母煩躁發昏穩婆者不過因其慣熟彼接生而已此輩多不明理見孕婦腹痛不辨弄胎與傷寒傷食便揉擦探侯大驚小怪意在邀功反致貽害故此事在孕婦亦宜有主見若聽説頭已臨門以致用力努掙遺誤不小若頭果臨門必備此八侯孕婦主見在此此時瓜熟蒂落水放舟流何可勉強胎前用藥只須佛手散束胎散達生湯多服庶胎前産後無病臨産用藥只宜無憂散加味芎歸湯此數方安生胎下死胎或跌磕傷胎服之奇效又或胞漿早破以致乾澀惟大用芎歸使宿血頓出新血驟生雖平淡何等功效從前催生奇方莫過鼠腎兔腦丸與回生丹不知鼠兔二丸例用香之物産時百脈解散血氣虧虛服此則胎下而香不消氣益耗矣且令毛竅疏鬆招風惹禍回生丹以大黃紅花為君內多消導之品血已虧而復破之多致産後發熱但橫生倒逆止用兔腦丸亦神效産後須多方調理有月數過期不産者屬血氣虛弱或因胎漏而産遲有血胎雖不墜其氣血已虧胚胎難長多至逾年不産凡十月後不産者用當歸補血湯庶分娩無憂又過期不産脈復沉細臍下時時悸動當作鬼胎只用十全大補湯加熟附緩圖功不可縱用巴豆莞花莽草鬼臼等毒藥急追取咎也産難産時子有出戶之勢必聽其胎兒慢慢轉身産母有力難助倘身猶未轉用氣一逼或腳先出俗呼踏花生或轉身稍緩努力一逼橫臥腹中一手先出俗呼討鹽生又有生路未順見頭偏拄左右名曰偏産又或偏拄穀道名曰振後急扶産母上床正身仰臥厚被蓋之內服補中益氣湯升提之須臾提上重新移頭對産門急扶即下産時門戶俱正兒已露頂而不下此轉身時臍帶絆其肩也扶母立身仰臥輕輕推兒向上以手指輕按兒肩去其臍帶然後用力送下胞水已下兒頭已至産門三四日仍不下者蓋因用力太早及兒欲産而力已乏令兒停住因而産戶乾澀産亦艱難此際惟八珍湯大劑補其元氣調其飲食自生濟世録云産難橫逆急令産母仰臥內用柞木枝取嫩者挫碎兩五分甘草取大者挫碎一兩用三碗水煎重封罐口煎至碗半每服一小碗不過三服即正外用萆麻子十四粒硃砂雄黃各一分蛇皮一隻燒灰真麝香二分俱研末將水和作一丸先用川椒煎湯洗臍置藥於內用紙重蓋以帛系之立效切勿聽穩婆動手揉擦亂吃方藥一誤再誤悔無及矣錢隱菴簡便方載橫生逆産或血海乾枯以致胎死不下命在須臾急用皮硝五分熟附子一錢五分好酒半杯童便半杯同煎三沸溫服立下百發百中隱菴謂臨産母氣先餒飲食減少最為可慮此際惟參為專功豫以人參救助者歷歷有案可驗若交骨不開日氣血衰不能連達宜十全大補湯助之自開加味芎歸湯亦可死胎從來辨死胎觀産母舌或青或赤青則胎死面赤舌青母活子死面青舌赤子活母死面舌俱青子母俱死然必腹陰冷重墜至紫黑血塊血縷流出尤為確症如雙胎一生一死必腹中半邊冷半邊熱其故或因産母氣不完固或熱毒內攻欲火傷胎或顛仆高墜所致又或驚動太早血先下而胎路乾涸僵死腹中惟令産母穩臥切勿用力努掙徒耗神氣但宜勉進飲食方用冬蜜一大杯以百沸湯調服之立下如無蜜用灶心土研對酒服或用夫尿煮沸服外用黃牛尿熱塗母臍腹上俱妙死胎至孕婦爪甲俱青腹脹氣喘口出臭氣最為危候急用黑豆一升炒熟入醋一大碗煎至五六分去豆取湯分三次服之以熱手摩小腹其胞胎俱下隱菴云下死胎古方用平胃散加芒硝功雖捷而暗中有損豫見用此者不一二年皆夭大都平胃克伐胃氣豫惟用脫花煎加芒硝五錢其胎化水而下保全歷有驗案至雙胎一生一死但服黑神散以暖其氣死胎下生胎亦安盤腸生謂腸隨兒下也遇此宜於衣下之後令母仰臥將子腸溫水洗淨輕推送入令其夾緊穀道自收或用半夏末吹鼻自收如不得藥用醋半杯新汲水半杯調勻近産婦面一嗔一縮三嗔收盡腸出久乾燥難收濃煎黃耆湯浸之內服補中益氣湯即上下次有孕臨月服當歸補血湯加訶子瞿麥粟殼以免慣證有兒並胞衣下後膀胱墜出産戶者用前法送入仍服補中益氣湯若穩婆不謹膀胱扯破者八珍湯加豬脬為引服之可復胞衣來遲胞衣未下恐惡露入胞脹大難出濃煎荊芥穗對童便服以消瘀血或煮夫尿沸服或以百沸湯對冬蜜服或用蛇皮一尺香油燈上燒研入麝一分為末對童便服或用紅花蒲黃煎對酒服或用灶突後黑土對酒服或用貝母蒺藜子研末對童便服或用黃麻根煮服俱妙至荷葉莧菜俗知用者不必載有用萆麻子塗足心恐用之不慎反遺咎故不載其法用藥方則以脫花加芒硝産婦元氣弱極胞衣來遲者用真青化桂三錢當歸川芎各一錢五分酒煎熱服立下用綿軟靠坐以童便對荊芥湯或對紫蘇日三服服至三日止如血車以米醋啐煅炭熏或以醋沃韭菜熏本婦宜生吞雞子一枚如血脹血噤氣喘欲死用蘇木煎服一切飲食宜淡産時胞胎既下氣血俱去忽爾眼黑頭眩神昏口噤昏不知人古書云惡露上攻血暈致不知此證有二一曰血暈一曰氣脫若以氣脫作血暈而用香辛逐血化痰之劑則立刻斃矣不可不懼氣脫證産時血既大下則血去氣亦去故昏暈不省微虛者片時即蘇大虛者竭脫便死但察其面目如眼閉口開手撒手冷六脈微細之甚或浮而散亂此即氣脫證也速用人參三五錢加入炒米煨薑紅棗煎湯徐徐灌之但得下咽即可救活若少遲延則無及矣無力備參者以大劑當歸補血湯加炒米煨薑紅棗煎湯灌下亦能救之有閉脫二證宜易辨如産後牙關緊閉兩手握拳謂之閉證有餘之候但疏風化痰可也如口張手撒眼閉遺尿鼾聲謂之脫證蓋口張心絶手撒脾絶眼閉肝絶遺尿腎絶鼾聲肺絶惟大進參附或可十中救一此不獨産後宜辨大凡中風中痰中暑氣厥及卒然倒僕昏暈者咸依此辨之血暈蓋本由氣虛一時昏暈然血壅痰盛亦或有之如果形氣脈氣俱有餘胸腹脹痛氣粗外證兩手握拳牙關緊閉此血逆證也用黑神散無脹無痛者悉屬氣虛用通治飲如小腹痛加山楂桃仁如夾傷風加柴胡産後除脫證不可用補蓋産後百節俱開氣血俱敗外則腠理不密易感風寒內則臟腑空虛易傷飲食稍有不慎諸證叢生古書以産後大補氣血為主後世因之不知表裡未清滋補一投反成大害昧者猶以藥力未到愈補愈深死而後己故陳飛霞遇師指授熟料五積散刊布蓋慮藥味辛散而以醋水拌炒故名熟料此方專治産後血滯痰滯氣滯頭疼身痛惡寒發熱寒熱往來腹脹懶食手足搐搦四肢痠疼渾身麻痹凡産後一切無名怪證並皆治之自謂此方四十餘年活人甚衆尤慮世人視為淺近諄切言之茲難畢録産後玉門腫痛用蛇床子煎湯頻洗自愈又玉門不閉或陰戶突出用石硫黃三錢菟絲子吳茱萸各二錢蛇床一錢五分水一碗煎至半碗頻洗自收産後乳汁不通用天花粉炒黃為末每用二錢以紅飯豆煎湯調服其乳流溢又有氣血虛無乳者用當歸三錢川芎二錢穿山甲炙王不留行各錢半木通五分豬蹄一隻以蹄爛為度去藥服湯並蹄立通小兒初誕救護夢生不能發聲切勿斷臍速用明火將胞衣炙暖使暖氣入兒腹更以熱湯燙臍帶用布袋裹貓頭足使伶俐婦人拿住貓頭向兒耳邊以口齧貓耳必大叫一聲兒即醒哭方可燒斷臍帶因産難救護産母兒在地久冒風寒氣欲絶不能啼者亦以法溫暖之暖氣入腹氣回即蘇斷臍帶俗皆以刀剪斷之最為不妥但以大紙捻蘸香油於臍帶上往來燒之令斷蓋所以補接陽氣不但為回生起死之良法且後日無傷風泄瀉之患沐浴用益母草梅葉桃李葉黃連豬膽虎骨煎湯洗之令兒永除瘡疥浴畢聊以輕粉摩身令兒不畏風又解諸氣又以臍帶燒灰塗乳服可免疒立患小兒初生隨以軟帛裹指蘸甘草湯拭去口中涎沫又看小兒身面紅唇舌紫知其必胎毒每日以帛蘸淡鹽茶洗其口則毒隨涎去病從何來此法至神異又至易簡直洗過周歲更為調燮若小兒唇面淡瑩惟以薑湯日洗一二次以其為胎寒也古方每用黃連大黃黃柏等藥不知稟受或虛受使苦寒克伐譬如蟲蟄萌芽卒遇凜雪嚴霜未有不為所將折者每見用此者在三朝七日必有缺乳肚疼泄瀉夜啼之證誰識為苦寒傷胃之害預防臍風馬牙用枯礬二錢五分硼砂五分硃砂二錢冰片五釐麝香五釐共為細末見兒下地洗過即用此末擦臍眼上每日換尿布時仍擦此末擦完一料永杜臍風等症小兒初生惟臍風為惡候鐵鏡云看見兩眼角黃必有臍風然稟受厚者滿面紅黃難辨惟令乳母於一七內時常摸兒兩乳乳內有一小核又看小兒不時噴嚏更多啼哭吮乳口松是真侯也急用薑片或蒜片貼於臍上及左右共三處隔半指遠用燈火各炙七壯共二十一壯再用冬瓜皮焙研細末以好墨搗爛蒸汁調和敷於臍之四圍又冬瓜皮煎水一匙服之立效又有氣息喘急啼聲不啼或肚上青筋吊疝作痛此胎毒夾風邪入臟外照前燈火內服指迷七氣湯若稍緩則難救矣小兒撮口噤風但看舌上有瘡如粟米是也用生蔥二根搗汁直殭蠶三個炒去絲研極細末以蔥汁調勻每用一匙灌入兒口小兒初生遍身如魚脬破則流水細研蜜侘參手艷之又有遍身無皮俱是紅肉急以米粉干之撲俟皮生則止初生大小便不通乃是胎熱急令婦人口含熱水吮兒胸前背心臍下兩手足心共七處每處吮七口以吮至紅色為度須臾自通又以蔥汁人乳調勻蒸熱抹兒口使吞即通通面皆青如靛染不吮噓昏迷不啼此是胎寒用人參白芍酒炒當歸各一錢枳殼陳壁土炒七分束胎散白朮土炒錢半黃芩一錢蘇葉八分大腹毛水洗去筋錢半砂仁五分炙草三分安胎飲黃耆蜜炙杜仲薑水炒茯苓各一錢阿膠炒成珠一錢續斷八分如胸脹加紫蘇飲紫蘇一錢當歸七分川芎白芍大腹皮洗去筋各五分甘草三分清暑飲白條一錢白朮土炒一錢黃耆
