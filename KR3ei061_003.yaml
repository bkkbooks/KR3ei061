body:
  text: 卷下産後門四字真言一曰靜産婦血氣兩傷動固不能而貧寒之家以無人在側而洗兒取水者有之自入房中開箱篋取衣服登高取物者亦有之此為動形傷已亡之血富貴之家婢媼紛集不必勞形而主中饋者以家事動心年少者以不如意動心心動傷已亡之氣故宜靜不惟此也並旁人亦宜靜血虛者心易動心沖而血暈至矣故不於房中高聲亦不以男女悲喜令其心安此為外靜二曰淡産婦飲食不在肥甘淡而已矣吳俗以齏粥楚俗戒食鹽雖似過甚然亦有益至於炒雞為食或以煎醬為食或以海味為食俗有不一總非合宜凡産後食淡煮雞子食軟飯及三日後與以肉食亦以淡為主三日內飲淡酒三日外與略醇酒蓋咸則傷腎後或絶産酸則傷肝行步維艱煎炒厚味傷脾至於血無所統而萬病作矣飲酒者傷氣且傷其乳故宜淡三曰坐産婦血下血水也激之可上流之可下故未産宜睡而已産宜坐使血不上攻故也亦須軟褥厚被冬溫夏涼此坐之一法四曰樂産後何憂憂嗣息境遇而已生兒者貧寒憂其難養富貴憂其難成若生女則憂益甚不知境遇自天嗣息自命憂亦何益又有可恨者生女溺之身上一塊肉口雖不言心其無悔鬱抑之氣結於心胸先欲望子嗣而或成蓐勞身之不存子將安出宜老成達人預為明說生男生女不用悲嘆即旁人亦不用悲嘆蓋樂則血氣易和血氣和而後無難成胎也故宜樂産後總論兒既出胎無他事矣所慮者胞不下及血亡過多而血暈産門不閉子腸不收惡露不行不止而已夫臨産與産後止瞬息異名耳症本有難分者以此出胎之一刻也然不分之而使倉卒難於翻閲亦有不可今但將試驗各方並己見數方列於後其産婦蓐勞傷寒等症不下數十難以枚舉亦無定方概置不録非以卷頁少而忽之也志産後産後方緊衣散古防胞衣不下最好須預備之生白礬研極細末三五分當兒才生下時隨以開水調服胞即收緊縱不下無妨又法於兒才生下已服礬末時將産母扶半起令一人從背後來以兩手操抱産母腹從臍以上起向下刮之其胞即出愈風散古預防産後血暈血風等症並治一切血分病荊芥穗童便炒七次令黑存性不拘多少研細末兒才生下時開水和童便調服三錢四味合愈風散參古治産後一切疾病才生下即服之妙當歸酒洗三錢延胡酒炒一錢血竭酒浸略炒沒藥制各錢半水煎調愈風散二錢服治胞衣不下方佛手散見胎前方內益母湯見前産難內治胞貫血奪命散古治胞衣不下及胞貫血才生下即服好沒藥制血竭制同前各二錢共研末用童便陳酒各半杯煎一二沸調服二錢良久再服惡血下行不至上攻牛膝湯見産難方內治胞不出臍腹堅脹急痛即殺人服此爛下加桂芎歸湯古治胞衣不下因産母元氣虛薄以此溫之自下川芎當歸各二錢肉桂一錢研末泡服水煎服體虛及有內傷者宜黑神散古治胞不下血氣攻衝心腹痞有寒者當歸酒洗酒芍熟地乾薑泡炒桂心一方用肉桂蒲黃炙草各一錢黑豆炒去皮一杯共為末每煎童便酒各半杯調服二錢加味芎歸湯見臨産內下胞保生無郁散見臨産內治胞厚不出一方胞不下用食鹽炒尉小腹向下尉又方用滾湯泡團莧菜子一錢服褪衣散古治胞衣不下於五月五日六月六七月七九月九或月下旬吉日五更時出門至水邊不天明採荷葉法用快刀一把長柄撈箕一隻亦長柄先將撈箕放貼水荷葉邊即將刀斷其梗隨用刀翻其里向上入撈箕內持歸不令人見雞犬見掛於無人到處檐下風乾不見日臨用剪蒂三個燒灰存性滾水泡服剪衣散古治胞衣不下取芡實葉徑一尺者採法收法禁忌並與上褪衣散同臨用剪作數片燒存性滾水泡服胞自片片脫下竹裂飲高治産後惡血衝心胞衣不下腹中血塊枳殼枳實姜皮各一錢乳香沒藥制各三錢槐枝柳枝各一寸拇指大脫落竹葉十皮不拘何竹鹽水炒急流水煎罐口上放本婦平素所用剪刀一把又古方用本婦鞋底炙熱尉小腹上七次或本夫的亦可扶母下衣方袁治同上加桂芎歸湯全當歸四錢酒洗川芎三錢熟地二錢半淮牛膝二錢蒲黃炒黑好墨煅紅醋淬一次各錢半冬葵子炒一錢爛蒲扇取近把處大作一塊手板幾片姜引急流水煎加酒半杯急吞下子腸不收産門不閉例言此病有二由來一也一以産母血氣素虧以致子腸隨出一有臨盆太早用力過多以致子腸不收産門不閉病共源同而治或異也此宜補血為主而治標亦宜急急方列後萆麻膏古治子腸不收萆麻仁草一粒不見鐵搗爛貼頂心又用三粒搗貼足心腸入須急急去之黃耆湯古治子腸不收蜜耆一斤煎水二斗令本婦溫服二三碗約三兩後以盆盛乘溫熏洗均不可太熱攝腸散參古治子腸不收蜜耆棗皮各二兩大腹皮姜水泡茯苓各三錢川芎一兩棗子百個煎水濃極熏洗又或用四物湯見胎前門煎服八珍湯古治子腸不收當歸茯苓各一兩酒芍焦術各五錢川芎八錢熟地二兩炙草三錢蜜黨參兩半若實系氣不能上升可用蜜耆四兩濃煎服此方立分最重然不如此不足以救急若本婦體素旺者可減半本方加蜜耆肉桂名十全大補湯治同高曰凡子腸不收收之無事又有兒出腸脫其半而胞貫血在內其半不出不治之症也我有一方十可救九列後閻王奪筆丹高治腸脫半胞貫血不出陳皮酒醋炒沒藥制茯苓當歸各四兩酒洗枳殼炒白芷各一兩百草霜五錢牝馬糞三餅濃煎水約四五大碗先令極穩當婦人斷其臍用微物墜之即將大批針伴臍帶刺破胞蒂令出血不可傷臍帶然後服藥一小碗又以藥水熏其腸胞出腸必盡出用黃耆湯之類羽林固宮湯高治産後子腸慣脫出者多服此下次可免蜜耆地骨皮酒煨去心香附去毛酒醋鹽水各炒一次各三錢棗皮炒一錢生地熟地酒芍各二錢五味子五分宣木瓜酒炒陳皮去白醋炒各一錢肝旺者棗皮減半芍用三錢用牝豬後足生男者左生女者右一具水煎去油入藥煮服七日外用十餘劑閉關湯古治産門不閉蜜耆二錢蜜玉竹三錢蜜黨參防風各錢半陳皮去白酒醋炒一次宣瓜黑荊芥北連翹去間各一錢五味子十粒龍眼肉十個核桃殼三個打分二塊引煎服又用陳皮不去白陳蘇兜銼碎各一兩加入醋少許同煎熏洗膠艾四物湯見胎前方內治産門不閉海龍塞羊湯見上卷八月內治同上方論惡露不行惡露不行之症須論本婦體氣性情不行一由於氣弱不送一由於肝不行血一由於性情悶郁躁怒憂傷皆有此病宜分治之烏龍散古治胞下惡露不行好墨煅紅醋淬七次研細五錢用滾新汲水泡服對酒少許芎歸加升柴湯袁治氣弱不送惡露不行川芎二錢全當歸酒洗四錢升麻五分紅胡酒炒一錢酒芍三錢水煎服若實系氣虛降不省人事加乳香沒藥制過二錢惡露不行而氣脫者再加蜜耆五錢若但氣虛不行而病非氣脫不用耆泄青二紅湯孫治怒氣惡露不行面青紫舌赤但此方必體氣壯血素熱者方可用歸尾三錢酒芍膽草酒蒸各二錢黃芩半用酒炒半生用共錢半連翹去間薄荷血竭各一錢茜草根二錢蘆根一尺引無蘆根用水邊懸起竹根皆一尺為度銼一節一斷共煎服又或有熱惡血不行者用本方加六一散一兩不拘時月逍遙八達湯袁治悶郁憂傷惡露不行悶郁憂傷二者同其人色青黃目淚好動而不動産用上四物加鬱金湯茯苓酒芍當歸酒洗各二錢炙草白蓮肉留心各錢半焦術薄荷各八分連翹去間一錢蒲黃炒黑五分茜草根錢半敗草帽頂一塊引煎服四物加鬱金湯參古治肝不行血惡露不行面青氣喘生地熟地當歸酒洗各四錢赤芍白芍酒煨鬱金酒炒川芎各二錢炙草一錢水煎服又方治惡露不行氣痛腹脹用乳香沒藥制過等分拌燈心研細滾水酒泡服每用二三錢行瘀止痛又虛寒不行者用黑神散見上胞不下內論惡露不止惡露不止不難治也血虛者用補血湯氣血雙虛者十全大補湯熱者有逍遙八達湯不行不止大同小異惟亡血過多者補血不同耳又有一症亡血已多而身熱腹痛以清涼藥則亡多矣以行血止痛則無血可行欲補則有舌燥唇焦面赤發熱等證似乎不可不知此亡血多不能潤體而成燥症一方列後加味四物湯古治産後血崩如豆汁紫黑過多者川芎酒芍蘇根各二錢當歸首三錢酒洗阿膠米粉炒珠一兩生地白芷各錢半蒲黃炒黑五分水煎服又方古治惡露不絶血崩不可禁腹中絞痛氣息急男乳發一握燒灰存性阿膠米粉炒珠羊角末酥炙各一兩黑乾薑灰乾地黃各二錢豬蹄殼一個全用燒灰存性無羊角用女發一把代為細末煉蜜丸如梧子大每空心米飲吞三四十丸日二服補血湯古治血虛惡露不止蜜耆一兩全當歸二兩水煎服凡亡血多者歸倍耆若氣分虛者耆倍歸十全大補湯見上子腸不收方內治氣血雙虛惡露不止豆淋酒古治産後猶有餘血水氣者黑豆五升熬令煙盡傾磁器內以酒淬之飲牡蠣散古治惡露淋瀝不斷心悶氣短四肢痿弱目眩頭重五心煩熱面黃體瘦牡蠣煅成粉二錢半熟地二錢當歸土炒香三錢蜜耆五錢茯苓續斷陳皮醋炒地骨皮酒蒸川芎各錢半炙草地榆酒炒各一錢龍骨煅酒淬一次五分姜三片棗二枚引水煎食前服逍遙八達湯見上惡露不行方內治有熱不止天露養榮湯袁治亡血已多身熱腹痛似熱非熱等證生地熟地天冬黑荊芥各二錢酒芍淮藥炒寸冬去心各錢半當歸酒洗二錢半元參甘草各一錢胡桃三個大棗三枚引煎服血暈氣脫血風例言産後血氣雙虧暈之所由起也亦風之所由起也雖然有辨世人言血暈不知有氣脫亦有血風當識本婦素來體氣如平日體氣不足者一旦血出氣隨血亡是為氣脫若體氣素不強不弱一旦亡血是為血暈又有因悲喜鬱積動於七情者又産時受熱受寒得於六淫者七情者肝木張六淫者肺氣塞是以有血風症既明析治之如神録古各方並新方列下愈風散見本卷之首治中風口噤手足抽掣及角弓反張血暈不省人事四肢強直或心頭倒築吐瀉欲死補血湯見前頁治體素虛寒或亡血過多致血暈悶絶不省人事芎歸加升柴湯見前惡露行內佛手散見胎前方內治並同補血湯保命集方古治血暈危困血足有熱者宜當歸土炒酒芍各五錢生地二兩水煎歸芍搗生地汁對服奪命散見前胞不下方內治血暈因心經言語顛倒健忘失志鬱金散古治血上衝心已死病起於七情者宜氣脫者禁用鬱金燒存性為末每用二錢釅醋一匙共調灌之即活又用韭菜一握搗爛放壺內以滾醋泡之將壺就血暈者鼻令通其氣立蘇但必血強方可用虛弱者惟灌以補血湯最效一丸散古統治虛實血氣痛甘草陳皮去白青皮各一片沉香一分共為細末飯和為丸臨用時搗爛童便參滾水吞或水酒吞四象歸原丹袁治外受寒熱發為血風手足搐掣口眼喎斜甚有哭笑狂歌者此六淫證也服此方一劑立愈六淫之說自古不言試想此時表涼下攻熱等藥均不可進將何作用此方立效當歸三錢甘草半生半熟共三錢川芎黑荊芥各二錢黃耆酒炒桔根各錢半白芷赤小豆各一錢緑升麻酒炒五分白紋銀一錠約二兩重辰砂明雄各三分不用引水煎服受寒重者加熟附吳萸泡各一錢黃芩二錢半酒炒此方用甘草為君人或不解不知心氣已亡君威不立於是外寇起矣得一良相攝主內外而五方從令患難自平此丹爐祕訣亦起死良方
